<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Paper - APC Research Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
      body { background-color: #f0f9ff; }

        font-size: 100px;

        font-family: inherit !important;

  <body class="font-sans text-slate-800 flex h-screen overflow-hidden">

      <div class="p-8 pb-4">
        <a href="dashboard.html" class="block cursor-pointer">
          <img src="logo-nci.png" alt="Nano Center Indonesia" class="w-40 mx-auto hover:opacity-80 transition" />
        </a>
      </div>
      <nav class="flex-1 mt-6">
        <a
          href="dashboard.html"
          class="flex items-center px-8 py-3 text-slate-500 hover:bg-sky-50 hover:text-sky-600 transition-colors cursor-pointer"
        >
          <i class="fa-solid fa-house text-lg w-5 mr-3"></i>
          <span class="font-medium text-sm">Dashboard</span>
        </a>
        <a
          href="paper.html"

          <i class="fa-regular fa-file-lines text-lg w-5 mr-3"></i>
          <span class="font-medium text-sm">Paper</span>
        </a>
        <a
          href="team.html"
          class="flex items-center px-8 py-3 text-slate-500 hover:bg-sky-50 hover:text-sky-600 transition-colors cursor-pointer"
        >
          <i class="fa-solid fa-user-group text-lg w-5 mr-3"></i>
          <span class="font-medium text-sm">Team</span>
        </a>
      </nav>
      <div class="p-6 border-t border-sky-50 mt-auto bg-white rounded-br-[2rem]">
        <button
          onclick="handleLogout()"
          class="flex items-center justify-center gap-2 text-red-500 hover:bg-red-50 hover:text-red-600 font-semibold rounded-lg transition py-2 text-sm w-full"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Logout
        </button>
      </div>
    </aside>

    <main class="flex-1 p-8 md:p-10 overflow-y-auto">
      <div class="bg-white rounded-[2rem] shadow-sm p-8 md:p-10 max-w-5xl mx-auto border border-sky-50 min-h-[650px] relative">

        <!-- LIST VIEW -->
        <div id="list-view" class="block w-full h-full flex flex-col relative">
          <h2 class="text-3xl font-medium mb-8 flex items-center text-slate-800">
            <i class="fa-regular fa-file-lines text-sky-500 mr-3"></i> Daftar Paper
          </h2>

          <!-- Loading indicator -->
          <div id="loading-indicator" class="flex items-center justify-center py-12 hidden">
            <div class="flex flex-col items-center gap-3">
              <i class="fa-solid fa-spinner fa-spin text-3xl text-sky-400"></i>
              <span class="text-sm text-slate-400">Memuat data dari server...</span>
            </div>
          </div>

          <div id="articles-table-container" class="border border-sky-100 rounded-2xl overflow-hidden shadow-sm mb-16 bg-white">
            <table class="w-full text-left text-sm text-slate-700 border-collapse">
              <thead>
                <tr class="text-slate-500 border-b border-sky-100 bg-sky-50/50 text-xs font-semibold uppercase">
                  <th class="p-4">Judul Paper</th>
                  <th class="p-4">Penulis</th>
                  <th class="p-4">Tahun</th>
                  <th class="p-4 text-right">Aksi</th>
                </tr>
              </thead>
              <tbody id="articles-table-body" class="divide-y divide-sky-50"></tbody>
            </table>
          </div>
          <div class="absolute bottom-0 right-0 p-2 bg-white rounded-full">
            <button onclick="showView('add-view')" class="bg-sky-100 hover:bg-sky-200 text-sky-700 font-semibold py-2.5 px-6 rounded-full flex items-center gap-2 transition-colors text-sm shadow-sm">
              <i class="fa-solid fa-plus text-sky-700"></i> Upload Paper Baru
            </button>
          </div>
        </div>

        <!-- ADD VIEW -->
        <div id="add-view" class="hidden w-full h-full flex flex-col relative">
          <h2 class="text-3xl font-medium mb-8 flex items-center text-slate-800">
            <i class="fa-solid fa-plus text-sky-500 mr-3"></i> Upload Paper Baru
          </h2>
          <form id="add-form" class="space-y-6 max-w-4xl pb-16">
            <div class="border border-sky-200 rounded-xl p-4 bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2">Judul Paper</label>
              <input type="text" id="add-title" required class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30" />
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2">Link Paper</label>
                <input type="url" id="add-link" class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30" />
              </div>
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2">DOI Paper</label>
                <input type="text" id="add-doi" class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30" />
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2">Nama Pembuat Paper</label>
                <input type="text" id="add-author" required class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30" />
              </div>
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2">Tahun Paper</label>
                <input type="text" id="add-year" required class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30" />
              </div>
            </div>
            <div class="border border-sky-200 rounded-xl p-4 bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2">Subteam</label>
              <select id="add-subteam" class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30">
                <option value="">-- Pilih Subteam --</option>
                <option value="Wastewater Solutions">Wastewater Solutions</option>
                <option value="Nanofibers">Nanofibers</option>
                <option value="Low-Dimensional Materials">Low-Dimensional Materials</option>
              </select>
            </div>
            <div class="border border-sky-200 rounded-xl p-4 relative file-input-wrapper overflow-hidden cursor-pointer bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2">Gambar Paper</label>
              <input type="file" id="add-file" accept="image/*" />
              <div class="border border-dashed border-sky-300 rounded-lg h-32 flex items-center justify-center bg-sky-50/50 hover:bg-sky-100 transition-colors text-sky-400 overflow-hidden">
                <img id="add-preview" src="#" alt="Preview" class="hidden h-full w-full object-cover" />
                <i id="add-placeholder-icon" class="fa-regular fa-image text-4xl"></i>
              </div>
            </div>
            <div class="absolute bottom-0 right-0 flex gap-3 p-2 bg-white rounded-full">
              <button type="button" onclick="showView('list-view')" class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-2.5 px-6 rounded-full transition-colors">
                <i class="fa-solid fa-xmark"></i> BATAL
              </button>
              <button type="submit" class="flex items-center gap-2 bg-sky-500 hover:bg-sky-600 text-white text-sm font-bold py-2.5 px-6 rounded-full transition-colors shadow-sm">
                <i class="fa-solid fa-cloud-arrow-up"></i> SIMPAN PAPER
              </button>
            </div>
          </form>
        </div>

        <!-- EDIT VIEW -->
        <div id="edit-view" class="hidden w-full h-full flex flex-col relative">
          <h2 class="text-3xl font-medium mb-8 flex items-center text-slate-800">
            <i class="fa-solid fa-marker text-sky-500 mr-3"></i> Edit Paper
          </h2>
          <form id="edit-form" class="space-y-6 max-w-4xl pb-16">
            <input type="hidden" id="edit-id" />
            <div class="border border-sky-200 rounded-xl p-4 bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2">Judul Paper</label>
              <input type="text" id="edit-title" required class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30" />
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2">Link Paper</label>
                <input type="url" id="edit-link" class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30" />
              </div>
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2">DOI Paper</label>
                <input type="text" id="edit-doi" class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30" />
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2">Nama Pembuat Paper</label>
                <input type="text" id="edit-author" required class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30" />
              </div>
              <div class="border border-sky-200 rounded-xl p-4 bg-white">
                <label class="block text-sm font-semibold text-sky-700 mb-2">Tahun Paper</label>
                <input type="text" id="edit-year" required class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30" />
              </div>
            </div>
            <div class="border border-sky-200 rounded-xl p-4 bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2">Subteam</label>
              <select id="edit-subteam" class="w-full border border-sky-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-sky-50/30">
                <option value="">-- Pilih Subteam --</option>
                <option value="Wastewater Solutions">Wastewater Solutions</option>
                <option value="Nanofibers">Nanofibers</option>
                <option value="Low-Dimensional Materials">Low-Dimensional Materials</option>
              </select>
            </div>
            <div class="border border-sky-200 rounded-xl p-4 relative file-input-wrapper overflow-hidden cursor-pointer bg-white">
              <label class="block text-sm font-semibold text-sky-700 mb-2">Ganti Gambar Paper</label>
              <input type="file" id="edit-file" accept="image/*" />
              <div class="border border-dashed border-sky-300 rounded-lg h-32 flex items-center justify-center bg-sky-50/50 hover:bg-sky-100 transition-colors text-sky-400 overflow-hidden">
                <img id="edit-preview" src="#" alt="Preview" class="hidden h-full w-full object-cover" />
                <i id="edit-placeholder-icon" class="fa-regular fa-image text-4xl"></i>
              </div>
            </div>
            <div class="absolute bottom-0 right-0 flex gap-3 p-2 bg-white rounded-full w-full justify-end">
              <button type="button" id="delete-article-btn" class="flex items-center gap-2 bg-red-100 hover:bg-red-200 text-red-700 text-sm font-bold py-2.5 px-6 rounded-full transition-colors mr-auto">
                <i class="fa-solid fa-trash-can"></i> HAPUS PAPER
              </button>
              <button type="button" onclick="showView('list-view')" class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-2.5 px-6 rounded-full transition-colors">
                <i class="fa-solid fa-xmark"></i> BATAL
              </button>
              <button type="submit" class="flex items-center gap-2 bg-sky-500 hover:bg-sky-600 text-white text-sm font-bold py-2.5 px-6 rounded-full transition-colors shadow-sm">
                <i class="fa-solid fa-floppy-disk"></i> SIMPAN PERUBAHAN
              </button>
            </div>
          </form>
        </div>

      </div>
    </main>

    <script>
      const STORAGE_KEY = "apc_articles_data";
      let articlesData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      let currentAddImage = null, currentEditImage = null;

      function saveArticles() { localStorage.setItem(STORAGE_KEY, JSON.stringify(articlesData)); }

      function logActivity(msg) {
        let logs = JSON.parse(localStorage.getItem('apc_activity_log') || '[]');
        logs.unshift({ msg, time: new Date().toISOString() });
        if (logs.length > 5) logs.length = 5;
        localStorage.setItem('apc_activity_log', JSON.stringify(logs));
      }

      function renderArticles() {
        const tbody = document.getElementById("articles-table-body");
        tbody.innerHTML = "";
        
        if (articlesData.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-400">Belum ada paper. Klik "Upload Paper Baru" untuk menambahkan.</td></tr>';
          return;
        }

        articlesData.forEach((art) => {
          const tr = document.createElement("tr");
          tr.className = "hover:bg-sky-50/50 transition border-b border-sky-50";
          tr.innerHTML = `
            <td class="p-4 font-medium text-slate-800 max-w-md truncate">${art.title}</td>
            <td class="p-4 text-slate-600">${art.author}</td>
            <td class="p-4 text-slate-500 font-mono text-xs">${art.year}</td>
            <td class="p-4 text-right">
              <button onclick="openEditView('${art.id}')" class="text-sky-600 hover:text-sky-800 font-semibold text-xs bg-sky-100 hover:bg-sky-200 px-3 py-1.5 rounded-full transition-colors">
                <i class="fa-solid fa-pen-to-square"></i> Edit
              </button>
            </td>`;
          tbody.appendChild(tr);
        });
      }

      function showView(viewId) {
        ["list-view", "add-view", "edit-view"].forEach(id => document.getElementById(id).classList.add("hidden"));
        document.getElementById(viewId).classList.remove("hidden");
        if (viewId === "list-view") { resetImage("add"); resetImage("edit"); }
      }

      function openEditView(id) {
        const art = articlesData.find((a) => a.id === id);
        if (art) {
          document.getElementById("edit-id").value = art.id;
          document.getElementById("edit-title").value = art.title;
          document.getElementById("edit-link").value = art.link || "";
          document.getElementById("edit-doi").value = art.doi || "";
          document.getElementById("edit-author").value = art.author || "";
          document.getElementById("edit-year").value = art.year || "";
          document.getElementById("edit-subteam").value = art.subteam || "";
          currentEditImage = art.imageUrl;
          art.imageUrl ? showPreview("edit", art.imageUrl) : resetImage("edit");
          showView("edit-view");
        }
      }

      function initImageUpload(inputId, prefix) {
        document.getElementById(inputId).addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function (ev) {
            if (prefix === "add") currentAddImage = ev.target.result;
            else currentEditImage = ev.target.result;
            showPreview(prefix, ev.target.result);
          };
          reader.readAsDataURL(file);
        });
      }

      function showPreview(pfx, src) {
        document.getElementById(`${pfx}-preview`).src = src;
        document.getElementById(`${pfx}-preview`).classList.remove("hidden");
        document.getElementById(`${pfx}-placeholder-icon`).classList.add("hidden");
      }

      function resetImage(pfx) {
        document.getElementById(`${pfx}-preview`).src = "#";
        document.getElementById(`${pfx}-preview`).classList.add("hidden");
        document.getElementById(`${pfx}-placeholder-icon`).classList.remove("hidden");
        document.getElementById(`${pfx}-file`).value = "";
        if (pfx === "add") currentAddImage = null;
        else currentEditImage = null;
      }

      function handleLogout() {
        localStorage.removeItem("apc_logged_in");
        window.location.href = "login.html";
      }

      initImageUpload("add-file", "add");
      initImageUpload("edit-file", "edit");

      // ============================================================
      // DATA FETCHING HELPERS
      // ============================================================
      async function fetchArticlesFromGitHub() {
        // Pada TRD v2, kita mengambil data dari _data/publications.yml 
        // secara public local fetch, bukan direct GitHub API lagi.
        try {
          const resp = await fetch("/api/read?path=_data/publications.yml");
          if (!resp.ok) return null;
          
          const result = await resp.json();
          if (!result.success) return null;
          
          const yamlText = result.content;
          const doc = jsyaml.load(yamlText);
          if (!doc) return [];

          return doc.map(pub => ({
            id: pub.title.toLowerCase().replace(/[^a-z0-9]+/g, "-"),
            fileName: pub.title.toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".yml",
            title: pub.title,
            author: pub.authors,
            year: pub.year,
            link: pub.link || "",
            doi: pub.doi || "",
            journal: pub.journal || "",
            subteam: pub.subteam || "",
            tags: pub.tags || [],
            keywords: pub.keywords || [],
            abstract: pub.abstract || "",
            introduction: pub.introduction || "",
            methods: pub.methods || "",
            results: pub.results || "",
            conclusion: pub.conclusion || "",
            references: pub.references || "",
            imageUrl: pub.graphical_abstract_url || null
          }));
        } catch (e) {
          console.error("Fetch API data error:", e);
          return null;
        }
      }

      async function pushArticleToGitHub(articleObj, commitMessage, isDelete = false) {
        try {
          // Construct the new full array to push
          let newArray = [...articlesData];
          if (isDelete) {
            newArray = newArray.filter(a => a.id !== articleObj.id);
          } else {
            const existing = newArray.findIndex(a => a.id === articleObj.id);
            if (existing >= 0) newArray[existing] = articleObj;
            else newArray.unshift(articleObj);
          }

          // Convert to YAML format
          const yamlObj = newArray.map(a => ({
            title: a.title,
            authors: a.author,
            year: a.year,
            link: a.link || "",
            doi: a.doi || "",
            journal: a.journal || "",
            subteam: a.subteam || "",
            tags: a.tags || [],
            keywords: a.keywords || [],
            abstract: a.abstract || "",
            introduction: a.introduction || "",
            methods: a.methods || "",
            results: a.results || "",
            conclusion: a.conclusion || "",
            references: a.references || "",
            graphical_abstract_url: a.imageUrl || ""
          }));
          
          const yamlContent = jsyaml.dump(yamlObj);

          const payload = {
            action: "update",
            path: "_data/publications.yml",
            content: yamlContent,
            message: commitMessage
          };

          const response = await fetch("/api/publish", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (response.ok) {
            const result = await response.json();
            if (result.success) {
              return true;
            } else {
              Swal.fire({ title: "Gagal!", text: result.error || "Gagal menghubungi server.", icon: "error" });
              return false;
            }
          } else if (response.status === 401) {
            Swal.fire({ title: "Sesi Habis", text: "Silakan login kembali.", icon: "error" }).then(() => {
              window.location.href = "login.html";
            });
            return false;
          } else {
            Swal.fire({ title: "Error Server", text: "Terjadi kesalahan pada backend.", icon: "error" });
            return false;
          }
        } catch (error) {
          Swal.fire({ title: "Error Jaringan", text: "Gagal menyambung ke server.", icon: "error" });
          return false;
        }
      }

      async function uploadImageToBlob(file) {
        try {
          const response = await fetch(`/api/upload?filename=${encodeURIComponent(file.name)}`, {
            method: "POST",
            body: file,
          });
          if (response.ok) {
            const result = await response.json();
            return result.url; // Returns the public URL of the uploaded image
          } else {
            console.error("Upload failed", await response.text());
            return null;
          }
        } catch (e) {
          console.error("Upload error", e);
          return null;
        }
      }

      // ============================================================
      // SUBMIT — Upload Paper Baru ke GitHub
      // ============================================================
      document.getElementById("add-form").addEventListener("submit", async function (e) {
        e.preventDefault();

        const title  = document.getElementById("add-title").value;
        const link   = document.getElementById("add-link").value;
        const doi    = document.getElementById("add-doi").value;
        const author = document.getElementById("add-author").value;
        const year   = document.getElementById("add-year").value;
        const dateObj  = new Date();
        const today    = dateObj.toISOString().split("T")[0];
        const slug     = title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)+/g, "");
        const uniqueId = Date.now();
        const fileName = `${today}-${slug}-${uniqueId}.md`; // Cleaned filename without _posts/ prefix

        const fileInput = document.getElementById("add-file");
        let uploadedImageUrl = null;

        Swal.fire({
          title: "Mengunggah paper...",
          text: "Mohon tunggu sebentar",
          allowOutsideClick: false,
          didOpen: () => { Swal.showLoading(); },
        });

        if (fileInput.files.length > 0) {
          uploadedImageUrl = await uploadImageToBlob(fileInput.files[0]);
        }

        const newArticle = {
          id: fileName,
          fileName: fileName,
          title, author, year, link, doi,
          journal: "",
          subteam: document.getElementById("add-subteam").value,
          tags: [],
          keywords: [],
          abstract: "",
          introduction: "",
          methods: "",
          results: "",
          conclusion: "",
          references: "",
          date: today,
          imageUrl: uploadedImageUrl,
          sha: null
        };

        const success = await pushArticleToGitHub(newArticle, `Admin: Publish paper "${title}"`);
        
        if (success) {
          articlesData.unshift(newArticle);
          saveArticles();
          logActivity("Admin menambahkan paper baru: " + title);
          renderArticles();
          showView("list-view");
          document.getElementById("add-form").reset();
          resetImage("add");
          Swal.fire({ title: "Berhasil Publish!", text: "Paper berhasil dipublikasikan.", icon: "success", confirmButtonColor: "#0ea5e9" });
        }
      });

      // ============================================================
      // EDIT PAPER
      // ============================================================
      document.getElementById("edit-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        const id  = document.getElementById("edit-id").value;
        const idx = articlesData.findIndex((a) => a.id === id);
        
        if (idx !== -1) {
          const oldData = { ...articlesData[idx] };
          
          Swal.fire({
            title: "Menyimpan perubahan...",
            text: "Mohon tunggu sebentar",
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); },
          });

          const fileInput = document.getElementById("edit-file");
          let uploadedImageUrl = currentEditImage; // keep old if no new file
          if (fileInput.files.length > 0) {
            uploadedImageUrl = await uploadImageToBlob(fileInput.files[0]);
          }

          articlesData[idx].title        = document.getElementById("edit-title").value;
          articlesData[idx].link         = document.getElementById("edit-link").value;
          articlesData[idx].doi          = document.getElementById("edit-doi").value;
          articlesData[idx].author       = document.getElementById("edit-author").value;
          articlesData[idx].year         = document.getElementById("edit-year").value;
          articlesData[idx].subteam      = document.getElementById("edit-subteam").value;
          articlesData[idx].imageUrl     = uploadedImageUrl;

          const success = await pushArticleToGitHub(articlesData[idx], `Admin: Update paper "${articlesData[idx].title}"`);

          if (success) {
            saveArticles();
            logActivity("Admin mengedit paper: " + articlesData[idx].title);
            renderArticles();
            showView("list-view");
            Swal.fire({ title: "Diperbarui!", text: "Perubahan paper berhasil disimpan.", icon: "success", timer: 1500, showConfirmButton: false });
          } else {
            articlesData[idx] = oldData; // Rollback
          }
        }
      });

      // ============================================================
      // HAPUS PAPER
      // ============================================================
      document.getElementById("delete-article-btn").addEventListener("click", async function () {
        const id    = document.getElementById("edit-id").value;
        const title = document.getElementById("edit-title").value;
        const idx = articlesData.findIndex((a) => a.id === id);

        if (idx === -1) return;

        const result = await Swal.fire({
          title: "Hapus Paper?",
          text: `Yakin ingin menghapus paper "${title}"? Perubahan akan langsung disimpan secara permanen.`,
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#ef4444",
          cancelButtonColor: "#64748b",
          confirmButtonText: "Ya, Hapus!",
          cancelButtonText: "Batal",
          reverseButtons: true,
        });

        if (result.isConfirmed) {
          Swal.fire({
            title: "Menghapus paper...",
            text: "Mohon tunggu sebentar",
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); },
          });

          const articleToDelete = articlesData[idx];
          const success = await pushArticleToGitHub(articleToDelete, `Admin: Hapus paper "${title}"`, true);

          if (success) {
            articlesData.splice(idx, 1);
            saveArticles();
            logActivity("Admin menghapus paper: " + title);
            renderArticles();
            showView("list-view");
            Swal.fire({ title: "Terhapus!", text: "Paper telah berhasil dihapus.", icon: "success", timer: 1500, showConfirmButton: false });
          }
        }
      });

      // ============================================================
      // INITIAL LOAD
      // ============================================================
      window.addEventListener("error", function(e) {
        alert("Error: " + e.message + " (Line: " + e.lineno + ")");
      });
      window.addEventListener("unhandledrejection", function(e) {
        alert("Promise Error: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
      });

      (async function init() {
        document.getElementById("loading-indicator").classList.remove("hidden");
        document.getElementById("articles-table-container").classList.add("hidden");

        const ghData = await fetchArticlesFromGitHub();
        
        document.getElementById("loading-indicator").classList.add("hidden");
        document.getElementById("articles-table-container").classList.remove("hidden");

        if (ghData) {
          articlesData = ghData;
          saveArticles(); // Sync to localStorage
        } else {
          // Fallback to localStorage
          articlesData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        }
        renderArticles();
      })();

      renderArticles();
    </script>
  </body>
</html>

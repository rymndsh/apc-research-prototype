<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main Dashboard - APC Research Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      /* Gradient khusus Baby Blue untuk tombol utama */
      .bg-baby-blue-gradient {
        background: linear-gradient(90deg, #38bdf8 0%, #0ea5e9 100%);
      }
      body {
        background-color: #f0f9ff; /* bg-sky-50 yang sangat lembut */
      }
    </style>
  </head>
  <body class="font-sans text-slate-800 flex h-screen overflow-hidden">
    <aside
      class="w-64 bg-white border-r border-sky-100 flex flex-col rounded-r-[2rem] shadow-sm flex-shrink-0 z-10"
    >
      <div class="p-8 pb-4">
        <a href="dashboard.html" class="block cursor-pointer">
          <img
            src="logo-nci.png"
            alt="Logo"
            class="w-40 mx-auto hover:opacity-80 transition"
          />
        </a>
      </div>
      <nav class="flex-1 mt-6">
        <a
          href="paper.html"
          class="flex items-center px-8 py-3 text-slate-500 hover:bg-sky-50 hover:text-sky-600 transition-colors"
        >
          <i class="fa-regular fa-file-lines text-lg w-5 mr-3"></i>
          <span class="font-medium text-sm">Paper</span>
        </a>
        <a
          href="people.html"
          class="flex items-center px-8 py-3 text-slate-500 hover:bg-sky-50 hover:text-sky-600 transition-colors cursor-pointer"
        >
          <i class="fa-solid fa-user-group text-lg w-5 mr-3"></i>
          <span class="font-medium text-sm">People</span>
        </a>
      </nav>
      <div
        class="p-6 border-t border-sky-50 mt-auto bg-white rounded-br-[2rem]"
      >
        <button
          onclick="prosesLogout(event)"
          class="w-full flex items-center justify-center gap-2 text-red-500 hover:bg-red-50 hover:text-red-600 font-semibold rounded-lg transition py-2 text-sm"
        >
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
          Logout
        </button>
      </div>
    </aside>

    <main class="flex-1 p-8 md:p-10 overflow-y-auto">
      <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b-2 border-sky-100 pb-4 gap-4"
      >
        <h1
          class="text-2xl font-semibold text-slate-800 uppercase tracking-wider"
        >
          Main Dashboard Overview
        </h1>

        <a
          href="/"
          target="_blank"
          class="flex items-center gap-2 bg-white border border-sky-200 hover:bg-sky-50 text-sky-700 font-bold py-2 px-4 rounded-lg transition-colors text-sm shadow-sm group"
        >
          <i
            class="fa-solid fa-arrow-up-right-from-square text-sky-500 group-hover:text-sky-700 transition-colors"
          ></i>
          Lihat Website
        </a>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-white p-5 rounded-xl shadow-sm border border-sky-50">
          <p class="text-xs text-sky-600 font-bold uppercase tracking-wider">
            Total Papers
          </p>
          <p id="metric-papers" class="text-4xl font-bold mt-2 text-slate-800">0</p>
        </div>
        <div class="bg-white p-5 rounded-xl shadow-sm border border-sky-50">
          <p class="text-xs text-sky-600 font-bold uppercase tracking-wider">
            Total Team
          </p>
          <p id="metric-team" class="text-4xl font-bold mt-2 text-slate-800">0</p>
        </div>
        <div class="bg-white p-5 rounded-xl shadow-sm border border-sky-50">
          <p class="text-xs text-sky-600 font-bold uppercase tracking-wider">
            Active Members
          </p>
          <p id="metric-active" class="text-4xl font-bold mt-2 text-slate-800">0</p>
        </div>
        <div class="bg-white p-5 rounded-xl shadow-sm border border-sky-50">
          <p class="text-xs text-sky-600 font-bold uppercase tracking-wider">
            Alumni
          </p>
          <p id="metric-alumni" class="text-4xl font-bold mt-2 text-slate-800">0</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div
          class="bg-white p-6 rounded-xl shadow-sm border border-sky-50 lg:col-span-2"
        >
          <h3 class="font-semibold text-lg mb-4 text-slate-800">
            Recent Drafts
          </h3>
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm text-slate-700">
              <thead>
                <tr class="text-slate-400 border-b border-sky-100">
                  <th class="pb-3 font-medium">Title</th>
                  <th class="pb-3 font-medium">Category</th>
                  <th class="pb-3 font-medium text-right">Last Edited</th>
                </tr>
              </thead>
              <tbody id="recent-drafts-body"></tbody>
            </table>
          </div>
        </div>

        <div class="space-y-6">
          <div class="bg-white p-6 rounded-xl shadow-sm border border-sky-50">
            <h3 class="font-semibold text-lg mb-4 text-slate-800">
              System Activity Feed
            </h3>
            <ul id="activity-feed-list" class="text-sm space-y-4 text-slate-600">
              <!-- JS injected -->
            </ul>
          </div>
        </div>
      </div>
    </main>

    <!-- Settings Token is now managed by Backend Vercel Functions -->

    <script>
      // Data Paper
      const articlesData = JSON.parse(localStorage.getItem("apc_articles_data")) || [];
      const tbody = document.getElementById("recent-drafts-body");
      tbody.innerHTML = "";

      if (articlesData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="py-4 text-slate-400 text-center">Belum ada data paper.</td></tr>';
      } else {
        articlesData.slice(0, 5).forEach((article) => {
          const tr = document.createElement("tr");
          tr.className = "border-b border-sky-50 hover:bg-sky-50 transition";
          tr.innerHTML = `
                  <td class="py-4 font-medium text-slate-800 line-clamp-1 max-w-[200px] truncate" title="${article.title}">${article.title}</td>
                  <td class="py-4 text-sky-500 font-mono text-xs">Publication</td>
                  <td class="py-4 text-slate-400 font-mono text-xs text-right">${article.date || article.year || '-'}</td>
              `;
          tbody.appendChild(tr);
        });
      }

      // Data People
      const membersData = JSON.parse(localStorage.getItem("apc_members_data")) || [];
      
      // Update Metrics
      document.getElementById("metric-papers").innerText = articlesData.length;
      document.getElementById("metric-team").innerText = membersData.length;
      document.getElementById("metric-active").innerText = membersData.filter(m => m.status !== 'alumni').length;
      document.getElementById("metric-alumni").innerText = membersData.filter(m => m.status === 'alumni').length;

      // System Activity Feed
      const logs = JSON.parse(localStorage.getItem("apc_activity_log")) || [];
      const logList = document.getElementById("activity-feed-list");
      logList.innerHTML = "";
      
      function timeSince(date) {
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        let interval = seconds / 31536000;
        if (interval > 1) return Math.floor(interval) + " yrs ago";
        interval = seconds / 2592000;
        if (interval > 1) return Math.floor(interval) + " mos ago";
        interval = seconds / 86400;
        if (interval > 1) return Math.floor(interval) + " days ago";
        interval = seconds / 3600;
        if (interval > 1) return Math.floor(interval) + " hrs ago";
        interval = seconds / 60;
        if (interval > 1) return Math.floor(interval) + " mins ago";
        return Math.floor(seconds) + " sec ago";
      }

      if (logs.length === 0) {
         logList.innerHTML = '<li class="text-slate-400">Belum ada aktivitas.</li>';
      } else {
         logs.forEach((log, i) => {
           const li = document.createElement("li");
           li.className = "flex flex-col gap-1 " + (i > 0 ? "border-t border-sky-50 pt-3" : "");
           li.innerHTML = `<span>${log.msg}</span><span class="text-slate-400 text-xs font-mono">${timeSince(log.time)}</span>`;
           logList.appendChild(li);
         });
      }

      // ==========================================
      // FUNGSI LOGOUT YANG AMAN UNTUK GITHUB PAGES
      // ==========================================
      function prosesLogout(e) {
        e.preventDefault();
        e.stopPropagation();

        localStorage.removeItem("apc_logged_in");
        sessionStorage.removeItem("apc_logged_in");

        var loginUrl;
        try {
          loginUrl = new URL("login.html", document.baseURI).href;
        } catch (_) {
          var path = window.location.pathname;
          var folder = path.substring(0, path.lastIndexOf("/") + 1);
          loginUrl = window.location.origin + folder + "login.html";
        }

        window.location.replace(loginUrl);
        throw new Error("LOGOUT_REDIRECT");
      }
    </script>
  </body>
</html>

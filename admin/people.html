    <!-- Settings Token is now managed by Backend Vercel Functions -->

    <script>
      // ============================================================
      // PROTEKSI HALAMAN
      // ============================================================
      // Dalam implementasi TRD v2, proteksi sesungguhnya ada di backend via cookie.
      // JS ini hanya sebagai fallback UX jika cookie belum ter-set dengan baik.
      if (localStorage.getItem("apc_logged_in") !== "true") {
        window.location.href = "login.html";
      }

      // ============================================================
      // DATA FETCHING HELPERS
      // ============================================================
      const DATA_FILE_PATH = "/_data/members.json";

      /**
       * Fetch current members.json locally.
       * Returns { members: [...] } or null if file doesn't exist.
       */
      async function fetchMembersFromGitHub() {
        try {
          const resp = await fetch("/api/read?path=_data/members.json");
          if (!resp.ok) return null;

          const result = await resp.json();
          if (!result.success) return null;
          
          const data = JSON.parse(result.content);
          return { members: data };
        } catch (e) {
          console.error("Fetch API data error:", e);
          return null;
        }
      }

      /**
       * Push updated members array to Backend.
       */
      async function pushMembersToGitHub(membersArray, commitMessage) {
        try {
          const contentStr = JSON.stringify(membersArray, null, 2);
          const payload = {
            action: "update",
            path: "_data/members.json",
            content: contentStr + "\n",
            message: commitMessage
          };

          const response = await fetch("/api/publish", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (response.ok) {
            const result = await response.json();
            if (result.success) {
              return true;
            } else {
              Swal.fire({ title: "Gagal!", text: result.error || "Gagal menghubungi server.", icon: "error" });
              return false;
            }
          } else if (response.status === 401) {
            Swal.fire({ title: "Sesi Habis", text: "Silakan login kembali.", icon: "error" }).then(() => {
              window.location.href = "login.html";
            });
            return false;
          } else {
            Swal.fire({ title: "Error Server", text: "Terjadi kesalahan pada backend.", icon: "error" });
            return false;
          }
        } catch (e) {
          Swal.fire({ title: "Error Jaringan", text: "Gagal menyambung ke server.", icon: "error" });
          return false;
        }
      }

      async function uploadImageToBlob(file) {
        try {
          const response = await fetch(`/api/upload?filename=${encodeURIComponent(file.name)}`, {
            method: "POST",
            body: file,
          });
          if (response.ok) {
            const result = await response.json();
            return result.url; // Returns the public URL of the uploaded image
          } else {
            console.error("Upload failed", await response.text());
            return null;
          }
        } catch (e) {
          console.error("Upload error", e);
          return null;
        }
      }

      // ============================================================
      // LOCAL DATA & RENDERING
      // ============================================================
      const STORAGE_KEY = "apc_members_data";
      const defaultMembers = [
        { id: 1, name: "Syaifudin", institution: "Bina Sarana Informatika", imageUrl: null },
        { id: 2, name: "Reymond", institution: "Universitas Indonesia", imageUrl: null },
        { id: 3, name: "Siti Aminah", institution: "Institut Teknologi Bandung", imageUrl: null },
      ];

      let membersData = [];
      let currentAddImageBase64 = null;
      let currentEditImageBase64 = null;

      function saveDataLocal() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(membersData));
      }

      function renderMembers() {
        const grid = document.getElementById("members-grid");
        const loading = document.getElementById("loading-indicator");
        grid.innerHTML = "";

        if (membersData.length === 0) {
          grid.innerHTML = '<div class="col-span-3 text-center py-12 text-slate-400"><i class="fa-regular fa-face-meh text-4xl mb-3"></i><p class="text-sm">Belum ada member. Klik "Tambah Member" untuk menambahkan.</p></div>';
        }

        membersData.forEach(function (member) {
          const card = document.createElement("div");
          card.className =
            "border border-sky-100 rounded-2xl p-6 flex flex-col items-center justify-center text-center cursor-pointer hover:shadow-md hover:border-sky-300 transition-all bg-white h-full group";
          card.onclick = function () { openEditView(member.id); };

          let imageElement = member.photo_url
            ? '<img src="' + member.photo_url + '" alt="' + member.name + '" class="w-20 h-20 rounded-full border-2 border-sky-200 mb-4 object-cover group-hover:scale-105 transition-transform">'
            : '<div class="w-20 h-20 rounded-full border-2 border-sky-100 mb-4 bg-sky-50 flex items-center justify-center text-sky-400 group-hover:scale-105 transition-transform"><i class="fa-solid fa-user text-3xl"></i></div>';

          let statusBadge = member.status === 'alumni' ? '<span class="text-[10px] px-2 py-0.5 bg-gray-100 text-gray-500 rounded-full mb-2">Alumni</span>' : '<span class="text-[10px] px-2 py-0.5 bg-sky-100 text-sky-600 rounded-full mb-2">Active</span>';

          card.innerHTML =
            statusBadge +
            imageElement +
            '<h3 class="font-bold text-slate-800 text-sm line-clamp-2">' + member.name + "</h3>" +
            '<p class="text-xs text-sky-600 mt-1">' + (member.position || 'Member') + "</p>" +
            '<p class="text-[10px] text-slate-500 mt-1 line-clamp-1">' + member.institution + "</p>";

          grid.appendChild(card);
        });

        loading.classList.add("hidden");
        grid.classList.remove("hidden");
      }

      function showView(viewId) {
        document.getElementById("list-view").classList.add("hidden");
        document.getElementById("add-view").classList.add("hidden");
        document.getElementById("edit-view").classList.add("hidden");
        document.getElementById(viewId).classList.remove("hidden");
        if (viewId === "list-view") {
          resetImagePreview("add");
          resetImagePreview("edit");
        }
      }

      function openEditView(id) {
        const member = membersData.find(function (m) { return m.id === id; });
        if (member) {
          document.getElementById("edit-id").value = member.id;
          document.getElementById("edit-name").value = member.name;
          document.getElementById("edit-institution").value = member.institution;
          document.getElementById("edit-position").value = member.position || "";
          document.getElementById("edit-role").value = member.role || "member";
          document.getElementById("edit-status").value = member.status || "active";
          document.getElementById("edit-join-year").value = member.join_year || new Date().getFullYear();
          document.getElementById("edit-internship-period").value = member.internship_period || "";
          currentEditImageBase64 = member.photo_url;
          if (member.photo_url) {
            showImagePreview("edit", member.photo_url);
          } else {
            resetImagePreview("edit");
          }
          showView("edit-view");
        }
      }

      // ============================================================
      // IMAGE UPLOAD HANDLERS
      // ============================================================
      function handleImageUpload(inputId, previewPrefix) {
        document.getElementById(inputId).addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function (event) {
            const base64String = event.target.result;
            if (previewPrefix === "add") currentAddImageBase64 = base64String;
            else currentEditImageBase64 = base64String;
            showImagePreview(previewPrefix, base64String);
          };
          reader.readAsDataURL(file);
        });
      }

      function showImagePreview(prefix, imgSrc) {
        document.getElementById(prefix + "-preview").src = imgSrc;
        document.getElementById(prefix + "-preview").classList.remove("hidden");
        document.getElementById(prefix + "-placeholder-icon").classList.add("hidden");
      }

      function resetImagePreview(prefix) {
        document.getElementById(prefix + "-preview").src = "#";
        document.getElementById(prefix + "-preview").classList.add("hidden");
        document.getElementById(prefix + "-placeholder-icon").classList.remove("hidden");
        document.getElementById(prefix + "-file").value = "";
        if (prefix === "add") currentAddImageBase64 = null;
        if (prefix === "edit") currentEditImageBase64 = null;
      }

      handleImageUpload("add-file", "add");
      handleImageUpload("edit-file", "edit");

      // ============================================================
      // LOGOUT
      // ============================================================
      function handleLogout() {
        localStorage.removeItem("apc_logged_in");
        window.location.href = "login.html";
      }

      // ============================================================
      // ADD MEMBER — Push to GitHub
      // ============================================================
      document.getElementById("add-form").addEventListener("submit", async function (e) {
        e.preventDefault();

        const name = document.getElementById("add-name").value.trim();
        const institution = document.getElementById("add-institution").value.trim();
        const position = document.getElementById("add-position").value.trim();
        const role = document.getElementById("add-role").value;
        const status = document.getElementById("add-status").value;
        const join_year = parseInt(document.getElementById("add-join-year").value) || null;
        const internship_period = document.getElementById("add-internship-period").value.trim();
        const newId = "member-" + Date.now();

        const fileInput = document.getElementById("add-file");
        let uploadedImageUrl = "";

        Swal.fire({
          title: "Menyimpan anggota...",
          text: "Mohon tunggu sebentar",
          allowOutsideClick: false,
          didOpen: function () { Swal.showLoading(); },
        });

        if (fileInput.files.length > 0) {
          uploadedImageUrl = await uploadImageToBlob(fileInput.files[0]) || "";
        }

        const newMember = {
          id: newId,
          name: name,
          position: position,
          role: role,
          institution: institution,
          status: status,
          join_year: join_year,
          internship_period: internship_period,
          photo_url: uploadedImageUrl,
        };

        membersData.push(newMember);
        saveDataLocal();
        renderMembers();



        const success = await pushMembersToGitHub(membersData, 'Admin: Tambah member "' + name + '"');

        if (success) {
          this.reset();
          resetImagePreview("add");
          showView("list-view");
          Swal.fire({ title: "Berhasil!", text: 'Anggota "' + name + '" berhasil ditambahkan.', icon: "success", confirmButtonColor: "#0ea5e9" });
        } else {
          // Revert local change if push failed
          membersData = membersData.filter(function (m) { return m.id !== newId; });
          saveDataLocal();
          renderMembers();
        }
      });

      // ============================================================
      // EDIT MEMBER — Push to GitHub
      // ============================================================
      document.getElementById("edit-form").addEventListener("submit", async function (e) {
        e.preventDefault();

        const idToEdit = document.getElementById("edit-id").value;
        const index = membersData.findIndex(function (m) { return String(m.id) === String(idToEdit); });
        if (index === -1) return;

        // Save old data for rollback
        const oldData = { ...membersData[index] };

        Swal.fire({
          title: "Menyimpan perubahan...",
          text: "Mohon tunggu sebentar",
          allowOutsideClick: false,
          didOpen: function () { Swal.showLoading(); },
        });

        const fileInput = document.getElementById("edit-file");
        let uploadedImageUrl = currentEditImageBase64; // keep old if no new file
        if (fileInput.files.length > 0) {
          uploadedImageUrl = await uploadImageToBlob(fileInput.files[0]) || "";
        }

        membersData[index].name = document.getElementById("edit-name").value.trim();
        membersData[index].institution = document.getElementById("edit-institution").value.trim();
        membersData[index].position = document.getElementById("edit-position").value.trim();
        membersData[index].role = document.getElementById("edit-role").value;
        membersData[index].status = document.getElementById("edit-status").value;
        membersData[index].join_year = parseInt(document.getElementById("edit-join-year").value) || null;
        membersData[index].internship_period = document.getElementById("edit-internship-period").value.trim();
        membersData[index].photo_url = uploadedImageUrl;
        saveDataLocal();
        renderMembers();



        const success = await pushMembersToGitHub(membersData, 'Admin: Update member "' + membersData[index].name + '"');

        if (success) {
          showView("list-view");
          Swal.fire({ title: "Diperbarui!", text: "Data anggota berhasil diubah.", icon: "success", timer: 1500, showConfirmButton: false });
        } else {
          // Rollback
          membersData[index] = oldData;
          saveDataLocal();
          renderMembers();
        }
      });

      // ============================================================
      // DELETE MEMBER — Push to GitHub
      // ============================================================
      document.getElementById("delete-btn").addEventListener("click", async function () {
        const idToDelete = document.getElementById("edit-id").value;
        const memberName = document.getElementById("edit-name").value;

        const result = await Swal.fire({
          title: "Hapus Member?",
          text: 'Apakah Anda yakin ingin menghapus "' + memberName + '"? Perubahan akan permanen.',
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#ef4444",
          cancelButtonColor: "#64748b",
          confirmButtonText: "Ya, Hapus!",
          cancelButtonText: "Batal",
          reverseButtons: true,
        });

        if (!result.isConfirmed) return;

        const deletedMember = membersData.find(function (m) { return String(m.id) === String(idToDelete); });
        const deletedIndex = membersData.findIndex(function (m) { return String(m.id) === String(idToDelete); });
        membersData = membersData.filter(function (m) { return String(m.id) !== String(idToDelete); });
        saveDataLocal();
        renderMembers();
        showView("list-view");

        Swal.fire({
          title: "Menghapus anggota...",
          text: "Mohon tunggu sebentar",
          allowOutsideClick: false,
          didOpen: function () { Swal.showLoading(); },
        });

        const success = await pushMembersToGitHub(membersData, 'Admin: Hapus member "' + memberName + '"');

        if (success) {
          Swal.fire({ title: "Terhapus!", text: 'Anggota "' + memberName + '" berhasil dihapus.', icon: "success", timer: 1500, showConfirmButton: false });
        } else {
          // Rollback
          membersData.splice(deletedIndex, 0, deletedMember);
          saveDataLocal();
          renderMembers();
        }
      });

      // ============================================================
      // INITIAL LOAD — Try GitHub first, fallback to localStorage
      // ============================================================
      window.addEventListener("error", function(e) {
        alert("Error: " + e.message + " (Line: " + e.lineno + ")");
      });
      window.addEventListener("unhandledrejection", function(e) {
        alert("Promise Error: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
      });

      (async function init() {
        const ghData = await fetchMembersFromGitHub();
        if (ghData && ghData.members) {
          membersData = ghData.members;
          saveDataLocal(); // Sync to localStorage
        } else {
          // Fallback to localStorage or defaults
          membersData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultMembers;
        }
        renderMembers();
      })();
    </script>
  </body>
</html>

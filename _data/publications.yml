- title: >-
    Optical and electrical characteristics of lead-free Cu-based halide
    perovskites in electrospun polystyrene nanofibers
  authors: APC Research Team — Nanofibers
  year: '2025'
  link: https://pubs.rsc.org/en/content/articlelanding/2025/tc/d5tc03393d
  doi: https://doi.org/10.1039/D5TC03393D
  journal: Advanced Materials
  subteam: Nanofibers
  tags:
    - Perovskites
    - Low-Dimensional
  keywords:
    - perovskites
    - 2D materials
    - optoelectronics
    - PMA
    - PEA
    - quantum confinement
  abstract: >-
    Engineering quasi-2D organic-inorganic hybrid perovskites (PMA, PEA, PPA)
    for advanced optoelectronics — probing crystal structure, quantum
    confinement, and luminescence tunability across visible spectrum.
  introduction: >-
    Quasi-two-dimensional (quasi-2D) Ruddlesden-Popper perovskites represent an
    exciting evolution beyond their three-dimensional counterparts, offering
    enhanced moisture stability and quantum confinement effects that enable
    precise bandgap engineering. These layered structures adopt the general
    formula (RNH₃)₂(A)ₙ₋₁BₙX₃ₙ₊₁, where n controls the number of inorganic
    octahedral layers and fundamentally determines electronic and optical
    properties.


    By varying the organic spacer cation (R), researchers can systematically
    tune exciton binding energies, carrier mobilities, and emission wavelengths
    across the visible spectrum. This structural tunability positions quasi-2D
    perovskites as highly promising candidates for light-emitting diodes (LEDs),
    photodetectors, and next-generation solar cells.
  methods: >-
    2.1 Material Synthesis

    Three organic spacer cations were investigated: phenylmethylammonium (PMA),
    phenylethylammonium (PEA), and phenylpropylammonium (PPA). Quasi-2D
    perovskites were synthesized via hot-injection in dimethylformamide, with n
    values of 1, 2, 3, and 4 targeted by stoichiometric adjustment of
    spacer:MA:Pb ratios.


    2.2 Characterization

    Crystal structures were determined by single-crystal X-ray diffraction
    (SCXRD). Optical absorption was measured by UV-Vis spectroscopy, and
    photoluminescence (PL) spectra were acquired under 365 nm excitation.
    Time-resolved PL (TRPL) lifetimes were measured using a time-correlated
    single-photon counting system.
  results: >-
    3.1 Structural Analysis

    SCXRD confirmed successful formation of layered perovskite structures for
    all three spacer cations. The degree of octahedral distortion increased in
    the order PPA > PEA > PMA, correlating with the increasing chain length of
    the organic spacer.


    3.2 Optical Properties

    A clear blue-shift of the absorption onset was observed with decreasing n,
    consistent with enhanced quantum confinement. PL emission peaks ranged from
    510 nm (n=1, PMA) to 535 nm (n=4, PPA), with PLQY values reaching 72% for
    n=2 PEA compounds, the highest among the series.


    3.3 Stability

    Films retained >85% of initial PL intensity after 500 hours under ambient
    conditions (45% RH, 25°C), significantly outperforming 3D MAPbI₃ reference
    samples which degraded completely within 100 hours.
  conclusion: >-
    Quasi-2D hybrid perovskites with systematically varied organic spacers
    demonstrate precise control over quantum confinement and optical emission
    across the visible spectrum. The PEA-based n=2 compound exhibits an optimal
    balance of high PLQY and ambient stability. These findings provide a clear
    structure-property roadmap for the rational design of next-generation
    perovskite optoelectronic devices.
  references: >-
    1. Tsai, H. et al. (2016). High-efficiency two-dimensional Ruddlesden–Popper
    perovskite solar cells. *Nature*, 536, 312–316.

    2. Mao, L. et al. (2019). Structural diversity in white-light-emitting
    hybrid lead bromide perovskites. *J. Am. Chem. Soc.*, 141(3), 1171–1175.

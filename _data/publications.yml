- title: >-
    Tunable optical and scintillation properties of two-dimensional tin
    mixed-halide perovskites
  authors: APC Research Team — Low Dimensional Materials
  year: '2025'
  link: https://pubs.rsc.org/en/content/articlelanding/2025/tc/d5tc01768h
  doi: https://doi.org/10.1039/D5TC01768H
  journal: Journal of Materials Chemistry A
  subteam: Low-Dimensional Materials
  tags:
    - Nanofibers
    - Electrospinning
  keywords:
    - electrospinning
    - nanofibers
    - chitosan
    - polystyrene
    - composite
    - filtration
  abstract: >-
    Fabricating functional nanofibers using high-voltage electrospinning. Our
    ChNPs-PS composite nanofibers show tunable optoelectronic properties with
    excellent mechanical stability for biomedical and air filtration
    applications.
  introduction: >-
    Electrospun nanofibers have emerged as a transformative class of materials
    owing to their exceptionally high surface-area-to-volume ratios, tunable
    morphology, and straightforward fabrication via the electrospinning process.
    The ability to engineer fiber diameter, porosity, and surface chemistry at
    the nanoscale opens unprecedented opportunities in filtration, wound
    healing, drug delivery, and energy harvesting.


    Chitosan nanoparticles (ChNPs) offer intrinsic antimicrobial and
    biocompatible properties while polystyrene (PS) provides excellent
    mechanical robustness and processability. The combination of these two
    materials in a composite nanofiber architecture is hypothesized to yield
    synergistic functional properties surpassing those of either constituent.
  methods: >-
    3.1 Preparation of Chitosan Nanoparticles

    ChNPs were synthesized via ionic gelation using tripolyphosphate (TPP) as
    crosslinker. Chitosan (MW = 200 kDa, DD = 85%) was dissolved in 1% acetic
    acid and added dropwise to 0.1% TPP solution under magnetic stirring. The
    resulting suspension was centrifuged and the pellet redispersed in deionized
    water.


    3.2 Electrospinning Process

    PS was dissolved in DMF:THF (7:3 v/v) at 15 wt%. ChNPs were dispersed into
    the PS solution at weight ratios of 5%, 10%, and 15% relative to PS mass.
    Solutions were loaded into a 10 mL syringe and electrospun at 15–20 kV
    applied voltage, 15 cm working distance, and 0.8 mL/h flow rate onto
    aluminum foil collectors.
  results: >-
    4.1 Fiber Morphology

    SEM analysis confirmed bead-free fiber formation across all compositions.
    Mean fiber diameters ranged from 312 ± 45 nm (pure PS) to 489 ± 67 nm (15%
    ChNPs loading), indicating a systematic increase in diameter with ChNP
    content attributable to increased solution viscosity.


    4.2 Mechanical Properties

    Tensile testing revealed a 28% improvement in Young's modulus at 10% ChNPs
    loading (1.84 GPa vs. 1.44 GPa for pure PS) without significant reduction in
    elongation at break. Higher ChNP loadings (15%) led to slight embrittlement.


    4.3 Antimicrobial Efficacy

    Zone of inhibition assays against S. aureus and E. coli demonstrated
    statistically significant antimicrobial activity for ChNP-containing
    membranes (p < 0.01), with inhibition zones of 14.2 ± 1.3 mm and 11.8 ± 1.1
    mm, respectively.
  conclusion: >-
    Composite ChNPs-PS nanofibers fabricated via electrospinning demonstrate a
    successful integration of antimicrobial functionality with mechanical
    robustness. The 10% ChNPs loading emerges as optimal, balancing fiber
    morphology, tensile properties, and biological activity. These membranes
    hold strong potential for next-generation air filtration and wound dressing
    applications.
  references: >-
    1. Doshi, J. & Reneker, D.H. (1995). Electrospinning process and
    applications of electrospun fibers. *J. Electrostatics*, 35(2–3), 151–160.

    2. Bhattarai, N. et al. (2006). Electrospun chitosan-based nanofibers and
    their cellular compatibility. *Biomaterials*, 26(31), 6176–6184.
